name: Keyboard
options:
  bundleIdPrefix: com.keyboardapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  indentWidth: 2
  tabWidth: 2
  usesTabs: false
  xcodeVersion: "15.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    SWIFT_UPCOMING_FEATURE_CONCISE_MAGIC_FILE: YES
    SWIFT_UPCOMING_FEATURE_FORWARD_TRAILING_CLOSURES: YES
    SWIFT_UPCOMING_FEATURE_IMPORT_OBJC_FORWARD_DECLS: YES
    SWIFT_UPCOMING_FEATURE_BARE_SLASH_REGEX_LITERALS: YES
    CLANG_ENABLE_MODULES: YES
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
      GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: "wholemodule"

packages:
  KeyboardKit:
    path: Packages/KeyboardKit

targets:
  Keyboard:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources
        optional: true
        buildPhase: resources
    dependencies:
      - target: KeyboardExtension
        embed: true
      - package: KeyboardKit
        product: AppFeature
      - package: KeyboardKit
        product: KeyboardUI
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Keyboard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "Voice typing runs fully on-device. The microphone is used only while the mic button is active in the keyboard."
        NSSpeechRecognitionUsageDescription: "Speech recognition is performed on-device using the models you download."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keyboardapp.app
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: App/Keyboard.entitlements
        SUPPORTS_MACCATALYST: NO

  KeyboardExtension:
    type: app-extension.keyboard
    platform: iOS
    sources:
      - path: KeyboardExtension/Sources
    dependencies:
      - package: KeyboardKit
        product: KeyboardUI
      - package: KeyboardKit
        product: SpeechRecognition
      - package: KeyboardKit
        product: ModelCatalog
      - package: KeyboardKit
        product: Persistence
      - package: KeyboardKit
        product: DesignSystem
      - package: KeyboardKit
        product: AppCore
    info:
      path: KeyboardExtension/Info.plist
      properties:
        CFBundleDisplayName: Keyboard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keyboardapp.app.keyboard
        CODE_SIGN_ENTITLEMENTS: KeyboardExtension/KeyboardExtension.entitlements
        SKIP_INSTALL: YES

schemes:
  Keyboard:
    build:
      targets:
        Keyboard: all
        KeyboardExtension: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
