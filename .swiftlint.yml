included:
  - App
  - KeyboardExtension
  - Packages/KeyboardKit/Sources

excluded:
  - .build
  - Packages/KeyboardKit/.build
  - DerivedData
  - build
  - "**/.swiftpm"

opt_in_rules:
  - explicit_self
  - indentation_width
  - switch_case_alignment
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - file_header
  - first_where
  - force_unwrapping
  - implicit_return
  - joined_default_parameter
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - todo
  - trailing_comma
  - multiple_closures_with_trailing_closure
  - opening_brace

indentation_width:
  indentation_width: 2
  include_comments: true

switch_case_alignment:
  indented_cases: true

line_length:
  warning: 120
  error: 160
  ignores_comments: false
  ignores_urls: true

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 120

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - to

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

nesting:
  type_level: 2

custom_rules:
  no_code_comments:
    name: "No Code Comments"
    regex: '^[^"\n]*?(?<!:)\/\/(?!\s*swiftlint:|\s*MARK:|\s*TODO:|\s*FIXME:)[^\n]*'
    match_kinds:
      - comment
      - comment.mark
      - comment.url
      - doc.comment
      - doc.comment.field
    message: "Source comments are not allowed. Let the code speak for itself; use commit messages for rationale."
    severity: warning

  no_block_comments:
    name: "No Block Comments"
    regex: '\/\*(?!\*\s*@)[\s\S]*?\*\/'
    match_kinds:
      - comment
      - doc.comment
    message: "Block comments are not allowed."
    severity: warning

  no_print:
    name: "No print"
    regex: '(?<!\w)print\s*\('
    message: "Use the Logger from AppCore instead of print."
    severity: warning

reporter: "xcode"
